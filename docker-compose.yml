services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: melgar_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-melgar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-melgar_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-melgarbot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-melgar} -d ${POSTGRES_DB:-melgarbot}"]
      interval: 5s
      timeout: 3s
      retries: 10

  n8n:
    image: n8nio/n8n:1.84.1
    container_name: melgar_n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678/}
      GENERIC_TIMEZONE: America/Bogota
      TZ: America/Bogota
      N8N_RUNNERS_ENABLED: "true"
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      MELGAR_PG_HOST: postgres
      MELGAR_PG_PORT: 5432
      MELGAR_PG_DB: ${POSTGRES_DB:-melgarbot}
      MELGAR_PG_USER: ${POSTGRES_USER:-melgar}
      MELGAR_PG_PASSWORD: ${POSTGRES_PASSWORD:-melgar_dev_pw}
    volumes:
      - n8n_data:/home/node/.n8n

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: melgar_pgadmin
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@melgar.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  admin-api:
    build:
      context: ./admin-api
      dockerfile: Dockerfile
    container_name: melgar_admin_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-melgarbot}
      PGUSER: ${POSTGRES_USER:-melgar}
      PGPASSWORD: ${POSTGRES_PASSWORD:-melgar_dev_pw}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      NODE_ENV: production

  admin-web:
    build:
      context: ./admin-web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    container_name: melgar_admin_web
    restart: unless-stopped
    depends_on:
      - admin-api
    ports:
      - "3000:80"

volumes:
  postgres_data:
  n8n_data:
  pgadmin_data:
